<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title> 
    <link href="/public/expense.css" rel="stylesheet">
</head>
<body>
    <div class="expense-form-container">
        <h1>Expense Tracker</h1>
        <div id="userGreeting"></div>

        <!-- Expense Form -->
        <form id="expenseForm">
            <label for="amount">Money Spent:</label>
            <input type="number" id="amount" name="amount" placeholder="Enter the amount" required><br><br>

            <label for="description">Expense Description:</label>
            <input type="text" id="description" name="description" placeholder="Enter the description" required><br><br>

            <label for="category">Category:</label>
            <select id="category" name="category" required>
                <option value="">--Select Category--</option>
                <option value="Food">Food</option>
                <option value="Petrol">Petrol</option>
                <option value="Salary">Salary</option>
                <option value="Entertainment">Entertainment</option>
                <option value="Other">Other</option>
            </select><br><br>

            <button type="submit">Add Expense</button>
        </form>

        <h2>Expense List</h2>
        <ul id="expenseList"></ul>

        <!-- Move Logout Button here -->
        <button id="logoutButton">Logout</button>
    </div>

    <script src="/public/expense.js"></script>
    <script>
        // Display the logged-in user's name
        const username = localStorage.getItem('username'); // Get username from local storage
        const userGreeting = document.getElementById('userGreeting');
        userGreeting.textContent = `Welcome, ${username ? username : 'Guest'}!`; // Fallback to 'Guest' if username is null

        // Logout functionality
        document.getElementById('logoutButton').addEventListener('click', () => {
            localStorage.removeItem('token');
            localStorage.removeItem('username');
            window.location.href = '/login'; // Redirect to login page
        });
    </script>
</body>
</html>
