<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title> 
    <link href="/public/expense.css" rel="stylesheet"> <!-- Link to your CSS file -->
</head>
<body>
    <div class="expense-form-container">
        <h1>Expense Tracker</h1>

        <!-- Expense Form -->
        <form id="expenseForm">
            <!-- Money Spent Input -->
            <label for="amount">Money Spent:</label>
            <input type="number" id="amount" name="amount" placeholder="Enter the amount" required><br><br>

            <!-- Description Input -->
            <label for="description">Expense Description:</label>
            <input type="text" id="description" name="description" placeholder="Enter the description" required><br><br>

            <!-- Category Dropdown -->
            <label for="category">Category:</label>
            <select id="category" name="category" required>
                <option value="">--Select Category--</option>
                <option value="Food">Food</option>
                <option value="Petrol">Petrol</option>
                <option value="Salary">Salary</option>
                <option value="Entertainment">Entertainment</option>
                <option value="Other">Other</option>
            </select><br><br>

            <!-- Submit Button -->
            <button type="submit">Add Expense</button>
        </form>

        <!-- List of Expenses -->
        <h2>Expense List</h2>
        <ul id="expenseList">
            <!-- Dynamic expenses will be listed here -->
        </ul>
    </div>

    <script src="/public/expense.js"></script> <!-- Link to your JavaScript file -->
</body>
</html>
