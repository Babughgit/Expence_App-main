<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link href="/public/expense.css" rel="stylesheet">
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body>
    <div class="expense-form-container">
        <h1>Expense Tracker</h1>

        <!-- Premium Section -->
        <div id="premiumSection">
            <button id="premium-button">Buy Premium</button>
        </div>

        <div id="userGreeting"></div>

        <!-- Expense Form -->
        <form id="expenseForm">
            <label for="amount">Money Spent:</label>
            <input type="number" id="amount" name="amount" placeholder="Enter the amount" required><br><br>

            <label for="description">Expense Description:</label>
            <input type="text" id="description" name="description" placeholder="Enter the description" required><br><br>

            <label for="category">Category:</label>
            <select id="category" name="category" required>
                <option value="">--Select Category--</option>
                <option value="Food">Food</option>
                <option value="Petrol">Petrol</option>
                <option value="Salary">Salary</option>
                <option value="Entertainment">Entertainment</option>
                <option value="Other">Other</option>
            </select><br><br>

            <button type="submit">Add Expense</button>
        </form>

        <h2>Expense List</h2>
        <ul id="expenseList"></ul>

        <!-- Logout Button -->
        <button id="logoutButton">Logout</button>

        <!-- Leaderboard Section -->
        <h2>Leaderboard</h2>
        <ul id="leaderboard"></ul>
        <div id="leaderboardMessage" style="color: red;"></div>
    </div>

    <script src="/public/expense.js" defer></script>

    <!-- Add the script to check for premium status -->
    <script>
        const token = localStorage.getItem('token'); // assuming you store the token here after login

        // Function to check if the logged-in user is a premium member
        async function checkPremiumStatus() {
            try {
                const response = await fetch('/user/status', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`, // Pass the JWT token
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error('Failed to fetch premium status');
                }

                const data = await response.json();

                // Update the button based on the user's premium status
                const premiumButton = document.getElementById('premium-button');
                if (data.isPremium) {
                    premiumButton.textContent = 'You are a premium member';
                    premiumButton.disabled = true;
                } else {
                    premiumButton.textContent = 'Buy Premium';
                    premiumButton.disabled = false;
                }

            } catch (error) {
                console.error('Error fetching premium status:', error);
            }
        }

        // Call the function when the page loads after login
        window.onload = () => {
            checkPremiumStatus();
        };

        // Logout functionality
        document.getElementById('logoutButton').addEventListener('click', () => {
            localStorage.removeItem('token');
            localStorage.removeItem('username');
            window.location.href = '/login'; // Redirect to login page
        });
    </script>
</body>
</html>
