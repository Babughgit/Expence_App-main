<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link href="/public/signup.css" rel="stylesheet">
    <style>
        .center {
            text-align: center; /* Center the text */
            margin-top: 20px; /* Optional: Add some space above */
        }
    </style>
</head>
<body>
    <div class="signup-container">
        <div class="center">
            <h1>Sign Up</h1>
        </div>
        
        <form id="signupForm">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required><br><br>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required><br><br>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required><br><br>

            <button type="submit">Sign Up</button>
        </form>

        <!-- Wrap the message display in a div with a class for centering -->
        <div id="message" class="center" style="color: green; display: none;"></div>

        <div class="center">
            <p>Already have an account? <a href="/login">Login here</a></p>
        </div>
    </div>

    <script src="/public/signup.js"></script>
</body>
</html>
